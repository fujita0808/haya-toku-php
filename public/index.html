<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>早得（HAYA-TOKU）（🍊ver / PHP PoC）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      background: #fff;
      color: #222;
    }

    #product {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #statusLabel {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    #rate {
      font-size: 48px;
      font-weight: bold;
      color: #ff6600;
      margin: 20px 0 10px;
    }

    #periodInfo {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    #message {
      min-height: 24px;
      margin: 10px 0 20px;
      font-size: 14px;
      color: #444;
    }

    #btn {
      padding: 15px 25px;
      font-size: 18px;
      background: #ff6600;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #modal {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #modalContent {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: min(420px, 100%);
    }

    #modalGuide {
      font-size: 16px;
      margin-bottom: 10px;
    }

    #countdown {
      font-size: 40px;
      margin: 10px 0;
      font-weight: bold;
    }

    #couponName {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    #modalRate {
      font-size: 18px;
      color: #ff6600;
      margin-top: 12px;
      font-weight: bold;
    }

    #modalSubMessage {
      font-size: 13px;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <div id="product">---</div>
  <div id="statusLabel">---</div>
  <div id="rate">--%</div>
  <div id="periodInfo">---</div>
  <div id="message"></div>

  <button id="btn">このクーポンを使う</button>

  <div id="modal">
    <div id="modalContent">
      <div id="modalGuide">店員さんに見せてください</div>
      <div id="countdown">10</div>
      <div id="couponName"></div>
      <div id="modalRate"></div>
      <div id="modalSubMessage"></div>
    </div>
  </div>

<script>
const API_BASE = "https://haya-toku-php.onrender.com/api";

let currentCouponId = null;
let countdownTimer = null;

function byId(id){ return document.getElementById(id); }

function setMessage(text, isError=false){
  const el = byId("message");
  el.innerText = text || "";
  el.style.color = isError ? "#c62828" : "#444";
}

function formatPercent(rate){
  return (Number(rate || 0) * 100).toFixed(0) + "%";
}

function formatDateTime(v){
  if(!v) return "-";
  const d = new Date(v);
  return isNaN(d) ? v : d.toLocaleString("ja-JP");
}

function closeModal(){
  byId("modal").style.display="none";
  clearInterval(countdownTimer);
}

function applyCurrentView(p){
  const app = p.app || {};
  const plan = p.plan || {};
  const schedule = p.schedule || {};

  if(app.documentTitle){
    document.title = app.documentTitle;
  }

  byId("product").innerText = plan.product_name || "---";
  byId("statusLabel").innerText = plan.status_label || "---";
  byId("rate").innerText = formatPercent(schedule.current_discount_rate);

  byId("periodInfo").innerText =
    `残り${schedule.remaining_days || 0}日 / 次回 ${formatDateTime(schedule.next_change_at)}`;

  const usable = schedule.is_active_now && plan.is_active;
  byId("btn").disabled = !usable;

  if(!usable){
    setMessage("現在この早得クーポンは発行できません", true);
  }else{
    setMessage("");
  }
}

async function loadCurrent(){
  const r = await fetch(API_BASE+"/coupon_current.php");
  const d = await r.json();

  if(!d.ok){
    setMessage(d.error?.message, true);
    return;
  }

  applyCurrentView(d.data);
}

async function issueCoupon(){
  const r = await fetch(API_BASE+"/coupon_issue.php",{method:"POST"});
  const d = await r.json();

  if(!d.ok){
    setMessage(d.error?.message, true);
    return;
  }

  const p = d.data;
  currentCouponId = p.coupon.id;

  openModal(p.plan.product_name, formatPercent(p.schedule.current_discount_rate));
}

async function useCoupon(){
  if(!currentCouponId) return;

  const r = await fetch(API_BASE+"/coupon_use.php",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({coupon_id: currentCouponId})
  });

  const d = await r.json();

  if(!d.ok){
    setMessage(d.error?.message,true);
  }else{
    setMessage(d.data.message);
  }

  closeModal();
  loadCurrent();
}

function openModal(name, rate){
  byId("modal").style.display="flex";
  byId("couponName").innerText=name;
  byId("modalRate").innerText=rate;

  let c=10;
  byId("countdown").innerText=c;

  countdownTimer=setInterval(()=>{
    c--;
    byId("countdown").innerText=c;
    if(c<=0){
      clearInterval(countdownTimer);
      useCoupon();
    }
  },1000);
}

byId("btn").onclick = issueCoupon;

loadCurrent();
</script>

</body>
</html>
