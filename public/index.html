<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>早得（HAYA-TOKU）（🍊ver / PHP PoC）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      background: #fff;
      color: #222;
    }

    #product {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #statusLabel {
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }

    #rate {
      font-size: 48px;
      font-weight: bold;
      color: #ff6600;
      margin: 20px 0 10px;
    }

    #periodInfo {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.6;
    }

    #message {
      min-height: 24px;
      margin: 10px 0 20px;
      font-size: 14px;
      color: #444;
    }

    #btn {
      padding: 15px 25px;
      font-size: 18px;
      background: #ff6600;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    #btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #modal {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #modalContent {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      width: min(420px, 100%);
    }

    #modalGuide {
      font-size: 16px;
      margin-bottom: 10px;
    }

    #countdown {
      font-size: 40px;
      margin: 10px 0;
      font-weight: bold;
    }

    #couponName {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    #modalRate {
      font-size: 18px;
      color: #ff6600;
      margin-top: 12px;
      font-weight: bold;
    }

    #modalSubMessage {
      font-size: 13px;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>

<body>

  <div id="product">---</div>
  <div id="statusLabel">---</div>
  <div id="rate">--%</div>
  <div id="periodInfo">---</div>
  <div id="message"></div>

  <button id="btn">このクーポンを使う</button>

  <div id="modal">
    <div id="modalContent">
      <div id="modalGuide">店員さんに見せてください</div>
      <div id="countdown">10</div>
      <div id="couponName"></div>
      <div id="modalRate"></div>
      <div id="modalSubMessage"></div>
    </div>
  </div>

  <script>
    const API_BASE = "https://haya-toku-php.onrender.com/api";

    let currentCouponId = null;
    let currentPlanId = null;
    let countdownTimer = null;

    function byId(id) {
      return document.getElementById(id);
    }

    function setMessage(text, isError = false) {
      const el = byId("message");
      el.innerText = text || "";
      el.style.color = isError ? "#c62828" : "#444";
    }

    function formatPercent(rate) {
      return (Number(rate || 0) * 100).toFixed(0) + "%";
    }

    function formatDateTime(v) {
      if (!v) return "-";
      const d = new Date(v);
      return isNaN(d) ? v : d.toLocaleString("ja-JP");
    }

    function closeModal() {
      byId("modal").style.display = "none";
      clearInterval(countdownTimer);
    }

    function applyCurrentView(payload) {
      const app = payload.app || {};
      const plan = payload.plan || {};
      const schedule = payload.schedule || {};

      currentPlanId = plan.id || null;

      if (app.documentTitle) {
        document.title = app.documentTitle;
      }

      byId("product").innerText = plan.product_name || "---";
      byId("statusLabel").innerText = plan.status_label || "---";
      byId("rate").innerText = formatPercent(schedule.current_discount_rate);

      byId("periodInfo").innerText =
        `残り${schedule.remaining_days || 0}日 / 次回 ${formatDateTime(schedule.next_change_at)}`;

      const usable = schedule.is_active_now && plan.is_active;
      byId("btn").disabled = !usable;

      if (!usable) {
        setMessage("現在この早得クーポンは発行できません。", true);
      } else {
        setMessage("");
      }
    }

    async function loadCurrent() {
      try {
        const r = await fetch(API_BASE + "/coupon_current.php");
        const d = await r.json();

        if (!d.ok) {
          currentPlanId = null;
          setMessage(d.error?.message || "現在表示可能なクーポンがありません。", true);
          byId("btn").disabled = true;
          byId("product").innerText = "---";
          byId("statusLabel").innerText = "---";
          byId("rate").innerText = "--%";
          byId("periodInfo").innerText = "---";
          return;
        }

        applyCurrentView(d.data);
      } catch (e) {
        setMessage("現在情報の取得に失敗しました。", true);
        byId("btn").disabled = true;
      }
    }

 async function issueCoupon() {
  try {
    if (!currentPlanId) {
      setMessage("対象プランIDが取得できていません。", true);
      return;
    }

    const r = await fetch(API_BASE + "/coupon_issue.php", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        plan_id: currentPlanId
      })
    });

    const d = await r.json();

    if (!d.ok) {
      setMessage(d.error?.message || "発行エラー", true);
      return;
    }

    const p = d.data;
    currentCouponId = p.coupon.id;

    openModal(
      p.plan.product_name || "クーポン",
      formatPercent(p.schedule.current_discount_rate)
    );
  } catch (e) {
    setMessage("クーポン発行に失敗しました。", true);
  }
}

    async function useCoupon() {
      if (!currentCouponId) return;

      try {
        const r = await fetch(API_BASE + "/coupon_use.php", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            coupon_id: currentCouponId
          })
        });

        const d = await r.json();

        if (!d.ok) {
          setMessage(d.error?.message || "使用エラー", true);
        } else {
          setMessage(d.data?.message || "クーポンを使用済みにしました。");
        }
      } catch (e) {
        setMessage("クーポン使用に失敗しました。", true);
      }

      closeModal();
      currentCouponId = null;
      loadCurrent();
    }

    function openModal(productName, rateText) {
      byId("modal").style.display = "flex";
      byId("couponName").innerText = productName;
      byId("modalRate").innerText = rateText;
      byId("modalSubMessage").innerText = "10秒後に自動で使用確定します。";

      let count = 10;
      byId("countdown").innerText = count;

      clearInterval(countdownTimer);
      countdownTimer = setInterval(() => {
        count--;
        byId("countdown").innerText = count;

        if (count <= 0) {
          clearInterval(countdownTimer);
          useCoupon();
        }
      }, 1000);
    }

    byId("btn").addEventListener("click", issueCoupon);

    byId("modal").addEventListener("click", (event) => {
      if (event.target === byId("modal")) {
        closeModal();
      }
    });

    loadCurrent();
  </script>

</body>

</html>
