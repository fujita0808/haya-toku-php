<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>HAYA-TOKU（🍊ver / PHP PoC）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
      background: #fff;
    }
    #rate {
      font-size: 48px;
      font-weight: bold;
      color: #ff6600;
      margin: 20px 0;
    }
    #product {
      font-size: 20px;
      margin-bottom: 10px;
    }
    #btn {
      padding: 15px 25px;
      font-size: 18px;
      background: #ff6600;
      color: #fff;
      border: none;
      border-radius: 8px;
    }
    #btn:disabled {
      background: #ccc;
    }

    /* モーダル */
    #modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
    }
    #modalContent {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
    }
    #countdown {
      font-size: 40px;
      margin: 10px 0;
    }
    #couponName {
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div id="product">---</div>
  <div id="rate">--%</div>

  <button id="btn">このクーポンを使う</button>

  <!-- モーダル -->
  <div id="modal">
    <div id="modalContent">
      <div>店員さんに見せてください</div>
      <div id="countdown">10</div>
      <div id="couponName"></div>
    </div>
  </div>

<script>
const API_BASE = "https://haya-toku-php.onrender.com/api";

let currentCouponId = null;
let countdownTimer = null;

/* 初期ロード */
async function loadCurrent() {
  const res = await fetch(API_BASE + "/coupon_current.php");
  const data = await res.json();

  if (!data.ok) {
    alert(data.message || "エラー");
    return;
  }

  document.getElementById("product").innerText = data.plan.product_name;
  document.getElementById("rate").innerText = Math.round(data.rate * 100) + "%";
}

/* クーポン発行 */
async function issueCoupon() {
  const res = await fetch(API_BASE + "/coupon_issue.php", {
    method: "POST"
  });
  const data = await res.json();

  if (!data.ok) {
    alert(data.message || "発行エラー");
    return;
  }

  currentCouponId = data.coupon_id;

  openModal(data.plan.product_name);
}

/* 使用確定 */
async function useCoupon() {
  if (!currentCouponId) return;

  await fetch(API_BASE + "/coupon_use.php", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      coupon_id: currentCouponId
    })
  });
}

/* モーダル */
function openModal(productName) {
  document.getElementById("modal").style.display = "flex";
  document.getElementById("couponName").innerText = productName;

  let count = 10;
  document.getElementById("countdown").innerText = count;

  countdownTimer = setInterval(() => {
    count--;
    document.getElementById("countdown").innerText = count;

    if (count <= 0) {
      clearInterval(countdownTimer);
      useCoupon();
    }
  }, 1000);
}

/* イベント */
document.getElementById("btn").onclick = issueCoupon;

/* 起動 */
loadCurrent();

</script>

</body>
</html>
